<!DOCTYPE html>
<html lang="en">
<head>
  <title>Zehong Shen</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Zehong Shen's personal homepage and selected research publications.">
  <link rel="stylesheet" type="text/css" href="src/stylesheet/my_style.css?v=20260522">
  <script src="src/js/publications.js?v=20260531"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      function loadFragment(targetId, path) {
        return fetch(path)
          .then(function(response) {
            if (!response.ok) {
              throw new Error("Failed to load " + path + ": " + response.status);
            }
            return response.text();
          })
          .then(function(html) {
            document.getElementById(targetId).innerHTML = html;
          });
      }

      loadFragment("page_about", "pages/about.html?v=20260522");
      loadFragment("page_publications", "pages/publication.html")
        .then(function() {
          return window.renderPublications();
        })
        .catch(function(error) {
          console.error(error);
        });
    });
  </script>
</head>

<body>
  <main class="site-shell">
    <div id="page_about"></div>
    <div id="page_publications"></div>
  </main>

  <script>
    if (!["localhost", "127.0.0.1", ""].includes(window.location.hostname)) {
      (function() {
        var script = document.createElement('script');
        script.async = true;
        script.src = 'https://www.googletagmanager.com/gtag/js?id=G-KEC30T48YD';
        document.head.appendChild(script);

        script.onload = function() {
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          gtag('js', new Date());
          gtag('config', 'G-KEC30T48YD');
        };
      })();
    }
  </script>

</body>
</html>
